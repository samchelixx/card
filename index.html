<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>samchelixx — Developer</title>
    <meta name="description" content="samchelixx — разработчик Telegram-ботов, Discord-ботов, Mini Apps и различных скриптов.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading screen -->
    <div class="loader" id="loader">
        <div class="loader__bar"></div>
    </div>

    <!-- Custom cursor -->
    <div class="cursor" id="cursor">
        <div class="cursor__dot"></div>
        <div class="cursor__ring"></div>
        <div class="cursor__trail" id="cursorTrail"></div>
    </div>

    <!-- Gradient mesh background -->
    <div class="mesh-bg">
        <div class="mesh-bg__blob mesh-bg__blob--1"></div>
        <div class="mesh-bg__blob mesh-bg__blob--2"></div>
        <div class="mesh-bg__blob mesh-bg__blob--3"></div>
    </div>

    <!-- Noise -->
    <div class="noise"></div>

    <!-- Particle field -->
    <canvas id="particles"></canvas>

    <main class="scene" id="scene">
        <div class="card-wrap" id="cardWrap">
            <div class="card" id="card">
                <!-- Inner glow that follows mouse -->
                <div class="card__spotlight" id="cardSpotlight"></div>
                <!-- Top shimmer -->
                <div class="card__shimmer"></div>
                <!-- Ripple container -->
                <div class="card__ripples" id="ripples"></div>

                <div class="avatar" data-depth="0.35" data-reveal="0">

                    <div class="avatar__ring" id="avatarRing">

                    <div class="avatar__status">

                    </h1>
                    <div class="hero__badges">
                        <span class="badge badge--primary" data-magnetic>

                            developer
                        </span>
                        <span class="badge badge--success" data-magnetic>
                            <span class="badge__dot badge__dot--green"></span>
                            available
                        </span>
                    </div>
                </div>

                <!-- === SKILLS === -->
                <div class="skills" data-depth="0.18" data-reveal="2">
                    <div class="skill" data-magnetic><span class="skill__inner">Telegram Bots</span></div>
                    <div class="skill" data-magnetic><span class="skill__inner">Discord Bots</span></div>
                    <div class="skill" data-magnetic><span class="skill__inner">Mini Apps</span></div>
                    <div class="skill" data-magnetic><span class="skill__inner">Python</span></div>
                    <div class="skill" data-magnetic><span class="skill__inner">JavaScript</span></div>
                    <div class="skill" data-magnetic><span class="skill__inner">Automation</span></div>
                </div>

                <!-- === DIVIDER === -->

                    <div class="divider__line"></div>
                    <span class="divider__text">контакты</span>
